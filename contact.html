<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <h2>Contact Me</h2>
  <p>If you want to connect with me, feel free to send a message.</p>

  <form id="contactForm">
    <input type="text" name="name" placeholder="Your Name" required><br><br>

    <input type="email" name="email" placeholder="Your Email" required><br><br>

    <textarea name="message" placeholder="Your Message" rows="5" required></textarea><br><br>

    <button type="submit">Send Message</button>
  </form>

  <script>
    const form = document.getElementById("contactForm");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const formData = new FormData(form);

      try {
        const response = await fetch("https://formspree.io/f/xpwvbred", {
          method: "POST",
          body: formData,
          headers: {
            "Accept": "application/json"
          }
        });

        if (response.ok) {
          alert("Message sent successfully!");
          form.reset();
        } else {
          alert("Failed to send message. Please try again.");
        }
      } catch (error) {
        alert("Error sending message. Check your internet connection.");
      }
    });
  </script>

</body>
</html>
